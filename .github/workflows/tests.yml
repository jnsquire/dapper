name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Python ${{ matrix.python-version }} • ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies (dev + frame-eval)
        run: uv sync --group dev --extra frame-eval

      - name: Smoke-check compiled extension
        if: matrix.python-version == '3.11' || matrix.python-version == '3.12'
        # run just the presence test in a fresh interpreter so we don't pollute
        # uv's worker pool; regression in #... was caused by the state carrying
        # over into the later full-suite step.
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            VENV_PYTHON=".venv/Scripts/python.exe"
          else
            VENV_PYTHON=".venv/bin/python"
          fi
          "$VENV_PYTHON" -m pytest tests/test_cython_extension_presence.py -q

      - name: Run 3.11 compiled eval-frame checks
        if: matrix.python-version == '3.11'
        shell: bash
        run: |
          uv run pytest \
            tests/unit/test_frame_eval_hook_lifecycle.py::test_low_level_hook_install_uninstall_is_idempotent \
            tests/unit/test_frame_eval_hook_lifecycle.py::test_eval_frame_pointer_changes_during_install \
            tests/unit/test_frame_eval_hook_lifecycle.py::test_live_eval_frame_hook_does_not_crash_or_dispatch_caller_frame \
            tests/unit/test_frame_eval_hook_lifecycle.py::test_live_eval_frame_hook_propagates_exception_event \
            tests/unit/test_bytecode_modification.py::test_metadata_version_mismatch \
            tests/integration/test_eval_frame_backend_end_to_end.py::test_eval_frame_backend_breakpoint_dispatches_stopped_event_end_to_end \
            -q

      - name: Run tests
        env:
          DAPPER_PYTEST_FORCE_OS_EXIT: ${{ startsWith(matrix.os, 'windows') && '1' || '0' }}
          DAPPER_FORCE_THREAD_SHUTDOWN: ${{ startsWith(matrix.os, 'windows') && '1' || '0' }}
        run: uv run pytest -q
