name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Python ${{ matrix.python-version }} • ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies (dev)
        run: uv sync --group dev

      - name: Build C extensions (frame-eval)
        # Ensure the Cython frame-eval extension is built and installed
        env:
          DAPPER_EXPERIMENTAL_FRAME_EVAL_311: ${{ matrix.python-version == '3.11' && '1' || '0' }}
        run: python -m pip install -e ".[frame-eval]"

      - name: Smoke-check compiled extension
        if: matrix.python-version == '3.11' || matrix.python-version == '3.12'
        env:
          DAPPER_EXPERIMENTAL_FRAME_EVAL_311: ${{ matrix.python-version == '3.11' && '1' || '0' }}
        # run just the presence test so we fail fast if the C extension didn't build
        run: uv run pytest tests/test_cython_extension_presence.py -q

      - name: Run experimental 3.11 compiled eval-frame checks
        if: matrix.python-version == '3.11'
        env:
          DAPPER_EXPERIMENTAL_FRAME_EVAL_311: '1'
        run: |
          uv run pytest \
            tests/unit/test_frame_eval_hook_lifecycle.py::test_low_level_hook_install_uninstall_is_idempotent \
            tests/unit/test_frame_eval_hook_lifecycle.py::test_eval_frame_pointer_changes_during_install \
            tests/unit/test_frame_eval_hook_lifecycle.py::test_live_eval_frame_hook_does_not_crash_or_dispatch_caller_frame \
            tests/unit/test_frame_eval_hook_lifecycle.py::test_live_eval_frame_hook_propagates_exception_event \
            tests/unit/test_bytecode_modification.py::test_metadata_version_mismatch \
            tests/integration/test_eval_frame_backend_end_to_end.py::test_eval_frame_backend_breakpoint_dispatches_stopped_event_end_to_end \
            -q

      - name: Run tests
        # make absolutely sure the experimental override isn't visible when
        # running the complete test suite; some earlier CI jobs leaked the
        # variable and caused a spurious failure in
        # test_frame_eval_capabilities_keep_3_11_line_access_visible.
        env:
          DAPPER_EXPERIMENTAL_FRAME_EVAL_311: '0'
          DAPPER_PYTEST_FORCE_OS_EXIT: ${{ startsWith(matrix.os, 'windows') && '1' || '0' }}
          DAPPER_FORCE_THREAD_SHUTDOWN: ${{ startsWith(matrix.os, 'windows') && '1' || '0' }}
        run: uv run pytest -q
