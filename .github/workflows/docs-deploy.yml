name: Docs deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and publish MkDocs site to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin

      - name: Build site
        run: mkdocs build

      # ensure there is at least one hidden file in the output so
      # the gh-pages action's "cp /site/.*" step doesn't complain
      - name: Add placeholder dotfile
        run: |
          mkdir -p site
          touch site/.placeholder

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
